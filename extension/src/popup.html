<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nomad</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f8f6f2;
        --panel: #fffdf8;
        --panel-soft: #fbf8f1;
        --ink: #2f2b27;
        --muted: #716b64;
        --faint: #ebe6dc;
        --line: #d9d2c6;
        --strong: #2f2a26;
        --phantom: #5b4fd7;
        --green: #2f6f55;
        --red: #9b4b40;
        --warn: #8a6626;
        --display: Georgia, "Times New Roman", Times, serif;
        --sans:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --mono:
          "SFMono-Regular", "Roboto Mono", Menlo, Monaco, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        width: 420px;
        max-height: 680px;
        margin: 0;
        overflow-y: auto;
        background: var(--paper);
        color: var(--ink);
        font: 13px/1.5 var(--sans);
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
        letter-spacing: 0;
      }

      .shell {
        padding: 18px;
      }

      .masthead {
        padding: 4px 0 22px;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font: 500 28px/1 var(--display);
      }

      .grid {
        display: grid;
        gap: 10px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.72);
      }

      .panel-body {
        padding: 13px;
      }

      .panel-head,
      .wallet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      h2 {
        margin: 0;
        color: var(--strong);
        font-size: 13px;
        font-weight: 700;
      }

      .tag {
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .field:first-child {
        margin-top: 0;
      }

      label,
      .label {
        color: var(--strong);
        font-size: 12px;
        font-weight: 650;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        outline: none;
        background: var(--panel);
        color: var(--ink);
      }

      input,
      select {
        min-height: 38px;
        padding: 8px 10px;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
        padding: 10px;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--strong);
        box-shadow: 0 0 0 3px rgba(91, 79, 215, 0.1);
      }

      button {
        min-height: 34px;
        border: 1px solid var(--strong);
        border-radius: 999px;
        padding: 7px 13px;
        color: var(--panel);
        background: var(--strong);
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover {
        background: #1f1b18;
      }

      button.secondary {
        color: var(--ink);
        border-color: var(--line);
        background: rgba(255, 253, 248, 0.84);
      }

      button.secondary:hover {
        border-color: var(--strong);
        background: var(--panel);
      }

      button.danger {
        border-color: #7a382f;
        background: var(--red);
      }

      .dev-skip {
        display: block;
        width: fit-content;
        min-height: 0;
        margin: 12px auto 0;
        border: 0;
        border-radius: 0;
        padding: 0;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
        font-weight: 500;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .dev-skip:hover {
        color: var(--strong);
        background: transparent;
      }

      .wallet-gate {
        padding: 0;
      }

      .phantom-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        min-height: 50px;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        color: #fff;
        background: var(--phantom);
      }

      .phantom-bar:hover {
        background: #4f43c9;
      }

      .phantom-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .phantom-logo {
        width: 26px;
        height: 26px;
        flex: 0 0 auto;
      }

      .phantom-name {
        font-size: 14px;
        font-weight: 700;
      }

      .phantom-action {
        font-size: 12px;
        font-weight: 650;
        opacity: 0.92;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 11px;
      }

      .readout {
        display: grid;
        gap: 4px;
        min-width: 0;
        padding: 10px;
        border: 1px solid var(--faint);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .readout + .readout {
        margin-top: 8px;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      code {
        color: var(--strong);
        font-family: var(--mono);
        font-size: 12px;
        word-break: break-all;
      }

      .balance {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 9px;
        padding-top: 9px;
        border-top: 1px solid var(--faint);
      }

      .hint,
      #ownerWarn {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      #ownerWarn:not(:empty) {
        color: var(--warn);
      }

      .status {
        display: none;
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid currentColor;
        font-weight: 650;
      }

      .status.pending {
        display: block;
        color: var(--warn);
        background: rgba(180, 138, 78, 0.13);
      }

      .status.ok {
        display: block;
        color: var(--green);
        background: rgba(47, 111, 85, 0.1);
      }

      .status.error {
        display: block;
        color: var(--red);
        background: rgba(155, 75, 64, 0.1);
      }

      .scope-readout {
        margin-top: 11px;
      }

      .verdict {
        display: none;
        margin-top: 11px;
        padding: 11px;
        border-radius: 8px;
        border: 1px solid currentColor;
        font-weight: 700;
      }

      .verdict.ok {
        color: var(--green);
        background: rgba(47, 111, 85, 0.1);
      }

      .verdict.deny {
        color: var(--red);
        background: rgba(155, 75, 64, 0.1);
      }

      .verdict.warn {
        color: var(--warn);
        background: rgba(180, 138, 78, 0.13);
      }

      pre {
        max-height: 112px;
        margin: 10px 0 0;
        overflow: auto;
        white-space: pre-wrap;
      }

      .activity {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
      }

      .activity:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <h1 id="nomad-title">Nomad</h1>
      </header>

      <select id="ownerMode" hidden aria-hidden="true">
        <option value="phantom" selected>Phantom</option>
      </select>

      <section id="walletGate" class="wallet-gate">
        <div class="wallet-head">
          <h2>Connect wallet</h2>
          <span class="tag">Phantom only</span>
        </div>
        <button id="connectOwner" class="phantom-bar">
          <span class="phantom-left">
            <svg
              class="phantom-logo"
              viewBox="0 0 32 32"
              role="img"
              aria-label="Phantom logo"
            >
              <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,.18)" />
              <path
                d="M8.2 18.3c0-6.1 4.4-10.1 9.8-10.1 5 0 8.1 3.6 8.1 8.6 0 4.7-2.6 7.1-5.1 7.1-1.6 0-2.4-.8-2.8-1.8-.8 1.3-2.2 2.4-4.1 2.4-3.4 0-5.9-2.2-5.9-6.2Z"
                fill="#fff"
              />
              <circle cx="18.9" cy="15.1" r="1.1" fill="#5b4fd7" />
              <circle cx="23.1" cy="15.1" r="1.1" fill="#5b4fd7" />
            </svg>
            <span class="phantom-name">Phantom</span>
          </span>
          <span class="phantom-action">Connect</span>
        </button>
        <button id="skipWallet" class="dev-skip">Skip for dev</button>
        <p id="ownerWarn"></p>
        <p id="ownerHint" class="hint"></p>
      </section>

      <div id="postWallet" class="grid" hidden>
        <section class="panel">
          <div class="panel-body">
            <div class="panel-head">
              <h2>Owner</h2>
              <span class="tag">Phantom</span>
            </div>
            <div class="readout">
              <span class="eyebrow">Wallet</span>
              <code id="ownerPubkey">none</code>
            </div>
            <div class="balance">
              <span class="eyebrow">Balance</span>
              <span><code id="ownerBalance">0.0000</code> SOL</span>
            </div>
          </div>
        </section>

        <section id="agentGate" class="panel">
          <div class="panel-body">
            <div class="panel-head">
              <h2>Sync agents</h2>
              <span class="tag">next step</span>
            </div>
            <div class="readout">
              <span class="eyebrow">Agent public key</span>
              <code id="agentPubkey">none</code>
            </div>
            <div class="actions">
              <button id="ensureAgent">Sync agents</button>
            </div>
          </div>
        </section>

        <div id="workspace" class="grid" hidden>
          <section class="panel">
            <div class="panel-body">
              <div class="panel-head">
                <h2>Network</h2>
                <span class="tag">settings</span>
              </div>
              <div class="field">
                <label for="cluster">Cluster</label>
                <select id="cluster">
                  <option value="localnet" selected>localnet</option>
                  <option value="devnet">devnet</option>
                  <option value="mainnet-beta">mainnet-beta</option>
                </select>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-body">
              <div class="panel-head">
                <h2>Agent</h2>
                <span class="tag">identity</span>
              </div>
              <div class="readout">
                <span class="eyebrow">Agent public key</span>
                <code id="workspaceAgentPubkey">none</code>
              </div>
              <div class="actions">
                <button id="resyncAgent" class="secondary">Sync agents</button>
                <button id="airdrop" class="secondary">Airdrop</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-body">
              <div class="panel-head">
                <h2>Passport</h2>
                <span class="tag">permissions</span>
              </div>
              <div class="field">
                <label for="label">Label</label>
                <input
                  id="label"
                  type="text"
                  maxlength="64"
                  placeholder="My Agent"
                />
              </div>
              <div class="field">
                <label for="permissions">Scopes</label>
                <textarea
                  id="permissions"
                  rows="4"
                  placeholder="calendar.read&#10;calendar.*"
                ></textarea>
              </div>
              <div class="actions">
                <button id="createPassport">Create</button>
                <button id="updatePassport" class="secondary">Update</button>
                <button id="revokePassport" class="danger">Revoke</button>
                <button id="loadPassport" class="secondary">
                  Load from chain
                </button>
              </div>
              <div id="txStatus" class="status"></div>
              <div class="readout scope-readout">
                <span class="eyebrow">On-chain scopes</span>
                <code id="onchainScopes">none</code>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-body">
              <div class="panel-head">
                <h2>Verify</h2>
                <span class="tag">signed action</span>
              </div>
              <div class="field">
                <label for="action">Action</label>
                <input id="action" type="text" placeholder="calendar.read" />
              </div>
              <div class="actions">
                <button id="attemptAction">Attempt</button>
              </div>
              <div id="verdict" class="verdict"></div>
            </div>
          </section>
        </div>
      </div>

      <pre id="log" class="activity"></pre>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
