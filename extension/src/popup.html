<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nomad</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f8f6f2;
        --paper-strong: #fffdf9;
        --ink: #322f2b;
        --muted: #716d67;
        --line: #dfdbd2;
        --line-strong: #cfc9be;
        --charcoal: #2f2b28;
        --charcoal-2: #4a443f;
        --sage: #7c8978;
        --amber: #c5a05d;
        --red: #9d4a3f;
        --green: #2f6f55;
        --mono:
          "SFMono-Regular", "Cascadia Mono", "Roboto Mono", Menlo, Consolas,
          monospace;
        --sans:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --display: Georgia, "Times New Roman", Times, serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 420px;
        max-height: 680px;
        margin: 0;
        overflow-y: auto;
        background: var(--paper);
        color: var(--ink);
        font: 13px/1.45 var(--sans);
        letter-spacing: 0;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
        letter-spacing: 0;
      }

      button {
        min-height: 34px;
        border: 1px solid var(--charcoal);
        border-radius: 999px;
        padding: 7px 13px;
        color: var(--paper-strong);
        background: var(--charcoal);
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover {
        background: #1f1c1a;
      }

      button.secondary {
        color: var(--ink);
        background: rgba(255, 253, 249, 0.76);
        border-color: var(--line-strong);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      button.secondary:hover {
        border-color: var(--charcoal-2);
        background: var(--paper-strong);
      }

      button.danger {
        color: #fff7f4;
        border-color: #7f332b;
        background: var(--red);
      }

      .shell {
        padding: 12px;
      }

      .hero {
        padding: 18px 8px 24px;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font: 500 46px/0.98 var(--display);
      }

      .subtitle {
        width: min(300px, 100%);
        margin: 12px auto 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
      }

      .panel {
        margin-top: 10px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 249, 0.74);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.85);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      h2 {
        margin: 0;
        color: var(--charcoal-2);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .status {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      label {
        display: grid;
        gap: 6px;
        margin: 10px 0 0;
        color: var(--charcoal-2);
        font-size: 12px;
        font-weight: 750;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: var(--paper-strong);
        color: var(--ink);
        outline: none;
      }

      input,
      select {
        min-height: 38px;
        padding: 8px 10px;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
        padding: 10px;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--charcoal-2);
        box-shadow: 0 0 0 3px rgba(197, 160, 93, 0.18);
      }

      code {
        color: var(--charcoal);
        font-family: var(--mono);
        font-size: 12px;
        word-break: break-all;
      }

      .key-list {
        display: grid;
        gap: 9px;
      }

      .key-row {
        display: grid;
        gap: 3px;
        padding: 10px;
        border: 1px solid rgba(223, 219, 210, 0.82);
        border-radius: 8px;
        background: rgba(248, 246, 242, 0.74);
      }

      .eyebrow {
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 11px;
      }

      .split-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .metric {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 8px;
        padding-top: 9px;
        border-top: 1px solid rgba(223, 219, 210, 0.78);
      }

      .hint {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .scope-readout {
        margin-top: 11px;
        padding: 10px;
        border: 1px solid rgba(223, 219, 210, 0.88);
        border-radius: 8px;
        background: rgba(248, 246, 242, 0.82);
      }

      .verdict {
        display: none;
        margin-top: 11px;
        padding: 11px;
        border-radius: 8px;
        border: 1px solid currentColor;
        font-weight: 800;
      }

      .verdict.ok {
        color: var(--green);
        background: rgba(47, 111, 85, 0.1);
      }

      .verdict.deny {
        color: var(--red);
        background: rgba(157, 74, 63, 0.1);
      }

      .verdict.warn {
        color: #8a6626;
        background: rgba(197, 160, 93, 0.14);
      }

      pre {
        max-height: 120px;
        margin: 10px 0 0;
        overflow: auto;
        white-space: pre-wrap;
      }

      .activity {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="nomad-title">
        <h1 id="nomad-title">Nomad</h1>
        <p class="subtitle">Portable permission passports for agent actions.</p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Network</h2>
          <span class="status">source of truth</span>
        </div>
        <label>
          Cluster
          <select id="cluster">
            <option value="localnet" selected>localnet</option>
            <option value="devnet">devnet</option>
            <option value="mainnet-beta">mainnet-beta</option>
          </select>
        </label>
        <p class="hint">Use localnet while the validator is running.</p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Identity</h2>
          <span class="status">agent key</span>
        </div>
        <div class="key-list">
          <div class="key-row">
            <span class="eyebrow">Public key</span>
            <code id="agentPubkey">none</code>
          </div>
        </div>
        <div class="button-row">
          <button id="ensureAgent">Create / load agent key</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Authority</h2>
          <span class="status">local owner</span>
        </div>
        <div class="key-list">
          <div class="key-row">
            <span class="eyebrow">Public key</span>
            <code id="ownerPubkey">none</code>
          </div>
        </div>
        <div class="metric">
          <span class="eyebrow">Balance</span>
          <span><code id="ownerBalance">0.0000</code> SOL</span>
        </div>
        <div class="button-row">
          <button id="ensureOwner">Create / load owner key</button>
          <button id="airdrop" class="secondary">Airdrop</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Passport</h2>
          <span class="status">on-chain scopes</span>
        </div>
        <label>
          Label
          <input id="label" type="text" maxlength="64" placeholder="My Agent" />
        </label>
        <label>
          Permissions
          <textarea
            id="permissions"
            rows="4"
            placeholder="calendar.read&#10;calendar.*"
          ></textarea>
        </label>
        <div class="button-row">
          <button id="createPassport">Create</button>
          <button id="updatePassport" class="secondary">Update</button>
          <button id="revokePassport" class="danger">Revoke</button>
          <button id="loadPassport" class="secondary">Load from chain</button>
        </div>
        <div class="scope-readout">
          <span class="eyebrow">On-chain scopes</span>
          <div><code id="onchainScopes">none</code></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Verify</h2>
          <span class="status">signed action</span>
        </div>
        <label>
          Action
          <input id="action" type="text" placeholder="calendar.read" />
        </label>
        <div class="button-row">
          <button id="attemptAction">Attempt</button>
        </div>
        <div id="verdict" class="verdict"></div>
      </section>

      <pre id="log" class="activity"></pre>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
